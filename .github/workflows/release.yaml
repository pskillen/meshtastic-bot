name: Release

on:
  release:
    types: [published]

jobs:
  unit-tests:
    uses: ./.github/workflows/unit-tests.yaml

  extract-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Extract Release Tag
        id: get_tag
        run: echo "VERSION_LABEL=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

    outputs:
      VERSION_LABEL: ${{ steps.get_tag.outputs.VERSION_LABEL }}
      IS_PRERELEASE: ${{ github.event.release.prerelease }}

  build-and-push:
    needs:
      - unit-tests
      - extract-tag
    uses: ./.github/workflows/docker-build.yaml
    with:
      VERSION_LABEL: ${{ needs.extract-tag.outputs.VERSION_LABEL }}
      ENVIRONMENT: ${{ needs.extract-tag.outputs.IS_PRERELEASE == 'true' && 'preprod' || 'prod' }}
